services:
  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sofoyo}
      POSTGRES_USER: ${POSTGRES_USER:-sofoyo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sofoyo}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cms:
    build:
      context: ./apps/cms
      args:
        BUILD_NODE_OPTIONS: ${CMS_BUILD_NODE_OPTIONS:---max-old-space-size=2048}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        SHARP_BINARY_HOST: ${SHARP_BINARY_HOST:-https://registry.npmmirror.com/-/binary/sharp}
        SHARP_LIBVIPS_BINARY_HOST: ${SHARP_LIBVIPS_BINARY_HOST:-https://registry.npmmirror.com/-/binary/sharp-libvips}
    env_file:
      - ./apps/cms/.env.example
    environment:
      DATABASE_HOST: postgres
      DATABASE_NAME: ${POSTGRES_DB:-sofoyo}
      DATABASE_USERNAME: ${POSTGRES_USER:-sofoyo}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-sofoyo}
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS:-changeMe1,changeMe2,changeMe3,changeMe4}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-changeMeTokenSalt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-changeMeAdminJwt}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-changeMeTransferSalt}
      JWT_SECRET: ${JWT_SECRET:-changeMeJwt}
    ports:
      - "127.0.0.1:1337:1337"
    depends_on:
      - postgres
    volumes:
      - cms_uploads:/app/public/uploads

  web:
    build:
      context: ./apps/web
    env_file:
      - ./apps/web/.env.example
    environment:
      STRAPI_URL: ${STRAPI_URL:-http://cms:1337}
      PUBLIC_STRAPI_URL: ${PUBLIC_STRAPI_URL:-http://localhost:1337}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:4321}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
      PUBLIC_LEGACY_ASSET_PREFIX: /legacy-assets
    ports:
      - "127.0.0.1:4321:4321"
    depends_on:
      - cms
    volumes:
      - ./www/legacy_export/site_assets:/app/dist/client/legacy-assets:ro

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - cms
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  cms_uploads:
